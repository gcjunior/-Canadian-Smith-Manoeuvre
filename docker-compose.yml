name: canadian-smith-manoeuvre

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smith}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smith}
      POSTGRES_DB: ${POSTGRES_DB:-smith_manoeuvre}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  temporal:
    image: temporalio/auto-setup:1.27.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-smith}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-smith}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - '7233:7233'
    volumes:
      - ./docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'temporal operator cluster health --address temporal:7233 || tctl --address temporal:7233 cluster health',
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
      args:
        NODE_IMAGE: node:20.19.3-alpine3.21
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smith}:${POSTGRES_PASSWORD:-smith}@postgres:5432/${POSTGRES_DB:-smith_manoeuvre}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  bank-simulator:
    build:
      context: .
      dockerfile: apps/bank-simulator/Dockerfile
      args:
        NODE_IMAGE: node:20.19.3-alpine3.21
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: bank-simulator
      SERVICE_VERSION: ${SERVICE_VERSION:-0.0.0}
      # Compose-local only — refuse defaults; must be length >= 32 (see packages/contracts env).
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-compose-local-webhook-signing-secret-32b}
      HOST: 0.0.0.0
      PORT: 3002
    ports:
      - '3002:3002'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  brokerage-simulator:
    build:
      context: .
      dockerfile: apps/brokerage-simulator/Dockerfile
      args:
        NODE_IMAGE: node:20.19.3-alpine3.21
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: brokerage-simulator
      SERVICE_VERSION: ${SERVICE_VERSION:-0.0.0}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-compose-local-webhook-signing-secret-32b}
      HOST: 0.0.0.0
      PORT: 3003
    ports:
      - '3003:3003'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3003/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_IMAGE: node:20.19.3-alpine3.21
    environment:
      # development unlocks /auth/dev-scenarios and /auth/dev-token for local UI login
      NODE_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: api
      SERVICE_VERSION: ${SERVICE_VERSION:-0.0.0}
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-smith}:${POSTGRES_PASSWORD:-smith}@postgres:5432/${POSTGRES_DB:-smith_manoeuvre}?schema=public
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-smith-manoeuvre}
      BANK_SIMULATOR_BASE_URL: http://bank-simulator:3002
      BROKERAGE_SIMULATOR_BASE_URL: http://brokerage-simulator:3003
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-America/Toronto}
      PLATFORM_MONTHLY_DRAW_CAP_CENTS: ${PLATFORM_MONTHLY_DRAW_CAP_CENTS:-500000}
      STARTUP_DEPENDENCY_TIMEOUT_MS: ${STARTUP_DEPENDENCY_TIMEOUT_MS:-60000}
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET:-compose-local-jwt-signing-secret-min-32b}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-compose-local-webhook-signing-secret-32b}
    ports:
      - '3001:3001'
    depends_on:
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
      bank-simulator:
        condition: service_healthy
      brokerage-simulator:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        # glibc required by @temporalio/core-bridge (Alpine/musl unsupported)
        NODE_IMAGE: node:20.19.3-bookworm-slim
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: worker
      SERVICE_VERSION: ${SERVICE_VERSION:-0.0.0}
      HEALTH_PORT: 3100
      DATABASE_URL: postgresql://${POSTGRES_USER:-smith}:${POSTGRES_PASSWORD:-smith}@postgres:5432/${POSTGRES_DB:-smith_manoeuvre}?schema=public
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-smith-manoeuvre}
      BANK_SIMULATOR_BASE_URL: http://bank-simulator:3002
      BROKERAGE_SIMULATOR_BASE_URL: http://brokerage-simulator:3003
      STARTUP_DEPENDENCY_TIMEOUT_MS: ${STARTUP_DEPENDENCY_TIMEOUT_MS:-60000}
    ports:
      - '3100:3100'
    depends_on:
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
      bank-simulator:
        condition: service_healthy
      brokerage-simulator:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_IMAGE: node:20.19.3-alpine3.21
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: web
      SERVICE_VERSION: ${SERVICE_VERSION:-0.0.0}
      # Server-side proxy must use the compose service name (not localhost).
      API_BASE_URL: http://api:3001
      # Browser-facing URL (host machine → published API port).
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_SHOW_RISK_DISCLOSURES: 'true'
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data:
